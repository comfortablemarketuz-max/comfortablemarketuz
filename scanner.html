<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QULAY MARKET — Kassa Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #16213e;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #0f3460;
        }
        .header h1 { font-size: 16px; font-weight: 700; color: #e94560; }
        .header .cart-count {
            background: #e94560;
            color: white;
            border-radius: 50%;
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold;
        }
        #scanner-container {
            position: relative;
            width: 100%;
            max-height: 250px;
            overflow: hidden;
            background: #000;
        }
        #interactive { width: 100%; height: 250px; }
        #interactive video { width: 100%; height: 100%; object-fit: cover; }
        .scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 100px;
            border: 2px solid #e94560;
            border-radius: 8px;
            pointer-events: none;
        }
        .scanner-line {
            position: absolute;
            top: 50%;
            left: 0; right: 0;
            height: 2px;
            background: rgba(233, 69, 96, 0.7);
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 10%; }
            100% { top: 90%; }
        }
        .scan-controls {
            padding: 12px 16px;
            display: flex;
            gap: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #e94560; color: white; }
        .btn-secondary { background: #0f3460; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; }
        .last-scan {
            margin: 0 16px;
            padding: 12px;
            background: #16213e;
            border-radius: 10px;
            border-left: 3px solid #e94560;
            min-height: 60px;
        }
        .last-scan .product-name { font-weight: 600; font-size: 14px; }
        .last-scan .product-price { color: #e94560; font-size: 13px; margin-top: 4px; }
        .last-scan .product-qty { color: #aaa; font-size: 12px; }
        .cart-section { flex: 1; overflow-y: auto; padding: 0 16px; margin-top: 12px; }
        .cart-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: #aaa; }
        .cart-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #16213e;
            border-radius: 8px;
            margin-bottom: 6px;
            gap: 10px;
        }
        .cart-item-name { flex: 1; font-size: 13px; }
        .cart-item-controls { display: flex; align-items: center; gap: 6px; }
        .qty-btn {
            width: 26px; height: 26px;
            border-radius: 50%;
            border: none;
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .qty-btn.minus { background: #e74c3c; color: white; }
        .qty-btn.plus { background: #2ecc71; color: white; }
        .qty-display { min-width: 24px; text-align: center; font-weight: 600; font-size: 14px; }
        .cart-item-price { font-size: 12px; color: #e94560; white-space: nowrap; }
        .total-section {
            padding: 16px;
            background: #16213e;
            border-top: 2px solid #0f3460;
            position: sticky;
            bottom: 0;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .total-label { font-size: 14px; color: #aaa; }
        .total-amount { font-size: 20px; font-weight: 700; color: #e94560; }
        .status-bar {
            padding: 6px 16px;
            text-align: center;
            font-size: 12px;
            background: #0f3460;
            color: #aaa;
            min-height: 28px;
        }
        .status-bar.success { background: #1a4a2e; color: #2ecc71; }
        .status-bar.error { background: #4a1a1a; color: #e74c3c; }
        .status-bar.info { background: #1a2a4a; color: #3498db; }
        .empty-cart {
            text-align: center;
            color: #555;
            padding: 20px;
            font-size: 13px;
        }
        #manual-input-row {
            padding: 8px 16px;
            display: flex;
            gap: 8px;
        }
        #manual-barcode {
            flex: 1;
            padding: 10px 12px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        #manual-barcode::placeholder { color: #555; }
        .scanning-indicator {
            display: none;
            position: absolute;
            top: 8px; right: 8px;
            background: #e94560;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
<div class="header">
    <h1>📷 QULAY MARKET Kassa</h1>
    <div class="cart-count" id="cart-count">0</div>
</div>

<div class="scan-controls">
    <button class="btn btn-primary" id="btn-scan" onclick="toggleScanner()">▶️ Skanerlash</button>
    <button class="btn btn-secondary" id="btn-stop" onclick="stopScanner()" style="display:none">⏹ To'xtatish</button>
</div>

<div id="scanner-container" style="display:none;">
    <div id="interactive"></div>
    <div class="scanner-overlay">
        <div class="scanner-line"></div>
    </div>
    <div class="scanning-indicator" id="scanning-indicator">SCANNING</div>
</div>

<div id="manual-input-row">
    <input type="text" id="manual-barcode" placeholder="Barcode qo'lda kiriting..." />
    <button class="btn btn-secondary" onclick="manualLookup()" style="flex:0;padding:10px 14px;">🔍</button>
</div>

<div class="last-scan" id="last-scan">
    <div style="color:#555;font-size:13px;">Mahsulot skanerlang...</div>
</div>

<div class="status-bar" id="status-bar">Tayyor</div>

<div class="cart-section">
    <div class="cart-title">🛒 SAVAT</div>
    <div id="cart-items">
        <div class="empty-cart">Savat bo'sh. Mahsulot skanerlang.</div>
    </div>
</div>

<div class="total-section">
    <div class="total-row">
        <span class="total-label">Jami summa:</span>
        <span class="total-amount" id="total-amount">0 so'm</span>
    </div>
    <button class="btn btn-success" onclick="completeSale()" id="btn-complete" disabled>
        ✅ Savdoni yakunlash
    </button>
    <button class="btn btn-danger" onclick="clearCart()" style="margin-top:6px;">
        🗑 Tozalash
    </button>
</div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
    tg.ready();
    tg.expand();
}

let cart = {};
let isScanning = false;
let lastScannedBarcode = null;
let scanCooldown = false;

function setStatus(msg, type = '') {
    const bar = document.getElementById('status-bar');
    bar.textContent = msg;
    bar.className = 'status-bar ' + type;
}

function formatPrice(amount) {
    return amount.toLocaleString('uz-UZ') + " so'm";
}

function toggleScanner() {
    if (isScanning) {
        stopScanner();
    } else {
        startScanner();
    }
}

function startScanner() {
    const container = document.getElementById('scanner-container');
    container.style.display = 'block';
    document.getElementById('btn-scan').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'flex';
    document.getElementById('scanning-indicator').style.display = 'block';

    Quagga.init({
        inputStream: {
            type: 'LiveStream',
            target: document.querySelector('#interactive'),
            constraints: {
                facingMode: 'environment',
                width: { ideal: 1280 },
                height: { ideal: 720 },
            },
        },
        decoder: {
            readers: [
                'ean_reader', 'ean_8_reader', 'code_128_reader',
                'code_39_reader', 'upc_reader', 'upc_e_reader',
                'codabar_reader', 'i2of5_reader',
            ],
        },
        locate: true,
        frequency: 10,
    }, function(err) {
        if (err) {
            setStatus('Kamera xatosi: ' + err, 'error');
            stopScanner();
            return;
        }
        Quagga.start();
        isScanning = true;
        setStatus('Kamera yoqildi. Barcodni skanerlang...', 'info');
    });

    Quagga.onDetected(function(result) {
        const code = result.codeResult.code;
        if (code && !scanCooldown) {
            handleBarcode(code);
        }
    });
}

function stopScanner() {
    if (isScanning) {
        Quagga.stop();
        isScanning = false;
    }
    document.getElementById('scanner-container').style.display = 'none';
    document.getElementById('btn-scan').style.display = 'flex';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('scanning-indicator').style.display = 'none';
    setStatus('Skaner to\'xtatildi', '');
}

async function handleBarcode(barcode) {
    if (barcode === lastScannedBarcode && scanCooldown) return;
    lastScannedBarcode = barcode;
    scanCooldown = true;
    setTimeout(() => { scanCooldown = false; }, 2000);

    setStatus(`Qidirilmoqda: ${barcode}...`, 'info');

    try {
        const resp = await fetch(`/api/product/${encodeURIComponent(barcode)}`);
        if (!resp.ok) {
            showNotFound(barcode);
            return;
        }
        const product = await resp.json();
        if (!product.in_stock) {
            setStatus(`❌ ${product.name} — omborda tugagan!`, 'error');
            return;
        }
        addToCart(product);
        showLastScan(product);
        setStatus(`✅ ${product.name} savatga qo'shildi!`, 'success');

        if (tg) {
            tg.HapticFeedback && tg.HapticFeedback.impactOccurred('light');
        }
    } catch (e) {
        setStatus('Tarmoq xatosi: ' + e.message, 'error');
    }
}

function showNotFound(barcode) {
    document.getElementById('last-scan').innerHTML = `
        <div class="product-name" style="color:#e74c3c;">❌ Topilmadi</div>
        <div class="product-qty">Barcode: ${barcode}</div>
    `;
    setStatus(`❌ Barcode topilmadi: ${barcode}`, 'error');
}

function showLastScan(product) {
    const priceText = product.has_discount
        ? `<s>${formatPrice(product.original_price)}</s> → <b>${formatPrice(product.price)}</b> 🏷️`
        : formatPrice(product.price);
    document.getElementById('last-scan').innerHTML = `
        <div class="product-name">✅ ${product.name}</div>
        <div class="product-price">${priceText}</div>
        <div class="product-qty">Ombor: ${product.quantity} ta</div>
    `;
}

function addToCart(product) {
    const key = product.barcode;
    if (cart[key]) {
        cart[key].quantity += 1;
    } else {
        cart[key] = {
            barcode: key,
            name: product.name,
            price: product.price,
            quantity: 1,
        };
    }
    renderCart();
}

function updateQty(barcode, delta) {
    if (!cart[barcode]) return;
    cart[barcode].quantity += delta;
    if (cart[barcode].quantity <= 0) {
        delete cart[barcode];
    }
    renderCart();
}

function removeFromCart(barcode) {
    delete cart[barcode];
    renderCart();
}

function clearCart() {
    cart = {};
    lastScannedBarcode = null;
    document.getElementById('last-scan').innerHTML = '<div style="color:#555;font-size:13px;">Mahsulot skanerlang...</div>';
    renderCart();
    setStatus('Savat tozalandi', '');
}

function renderCart() {
    const container = document.getElementById('cart-items');
    const keys = Object.keys(cart);
    document.getElementById('cart-count').textContent = keys.reduce((s, k) => s + cart[k].quantity, 0);

    if (keys.length === 0) {
        container.innerHTML = '<div class="empty-cart">Savat bo\'sh. Mahsulot skanerlang.</div>';
        document.getElementById('total-amount').textContent = "0 so'm";
        document.getElementById('btn-complete').disabled = true;
        return;
    }

    let total = 0;
    let html = '';
    for (const key of keys) {
        const item = cart[key];
        const subtotal = item.price * item.quantity;
        total += subtotal;
        html += `
            <div class="cart-item">
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-controls">
                    <button class="qty-btn minus" onclick="updateQty('${key}', -1)">−</button>
                    <span class="qty-display">${item.quantity}</span>
                    <button class="qty-btn plus" onclick="updateQty('${key}', +1)">+</button>
                </div>
                <div class="cart-item-price">${formatPrice(subtotal)}</div>
            </div>
        `;
    }
    container.innerHTML = html;
    document.getElementById('total-amount').textContent = formatPrice(total);
    document.getElementById('btn-complete').disabled = false;
}

async function completeSale() {
    const keys = Object.keys(cart);
    if (keys.length === 0) {
        setStatus('Savat bo\'sh!', 'error');
        return;
    }
    document.getElementById('btn-complete').disabled = true;
    setStatus('Saqlanmoqda...', 'info');

    const items = keys.map(key => ({
        barcode: cart[key].barcode,
        quantity: cart[key].quantity,
    }));

    if (tg) {
        tg.sendData(JSON.stringify({
            action: 'sale_complete',
            items: items,
        }));
        clearCart();
        setStatus('✅ Savdo yuborildi!', 'success');
        setTimeout(() => tg.close(), 1500);
    } else {
        setStatus('❌ Telegram WebApp topilmadi', 'error');
        document.getElementById('btn-complete').disabled = false;
    }
}

async function manualLookup() {
    const input = document.getElementById('manual-barcode');
    const barcode = input.value.trim();
    if (!barcode) return;
    await handleBarcode(barcode);
    input.value = '';
}

document.getElementById('manual-barcode').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') manualLookup();
});
</script>
</body>
</html>
